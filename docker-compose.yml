# Step 1: Local PostgreSQL for FeelAtHomeNow backend (sync psycopg2).
# Run: docker compose up -d db
# Then set in backend/.env:
#   DATABASE_URL=postgresql+psycopg2://feelathomenow:localdevpassword@localhost:5432/feelathomenow_dev

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: feelathomenow
      POSTGRES_PASSWORD: localdevpassword
      POSTGRES_DB: feelathomenow_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feelathomenow -d feelathomenow_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
