# Alembic config for FeelAtHomeNow backend (sync SQLAlchemy / psycopg2).
# Run from backend/: alembic upgrade head | alembic revision -m "message"
# Database URL is read from backend/.env (DATABASE_URL or PG_*) in env.py.

[alembic]
script_location = alembic
prepend_sys_path = .
# Placeholder; env.py overrides from backend/.env
sqlalchemy.url = postgresql+psycopg2://localhost/feelathomenow_dev

[post_write_hooks]
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
