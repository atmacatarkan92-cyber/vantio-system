name: Render Backup

on:
  workflow_dispatch:

jobs:
  trigger-backup:
    runs-on: ubuntu-latest

    steps:
      - name: List Render Postgres instances
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set -euo pipefail

          echo "Calling Render API..."

          curl -sS -f "https://api.render.com/v1/postgres" \
            -H "Authorization: Bearer ${RENDER_API_KEY}"
