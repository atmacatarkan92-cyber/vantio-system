name: Render Backup

on:
  schedule:
    - cron: "0 3 * * 0"  # every Sunday at 03:00 UTC
  workflow_dispatch:

jobs:
  trigger-backup:
    runs-on: ubuntu-latest

    steps:
      - name: Verify Render Postgres ID
        run: |
          set -euo pipefail

          echo "Verifying Render Postgres instance..."

          RESPONSE=$(curl -sS -f "https://api.render.com/v1/postgres/${{ secrets.RENDER_POSTGRES_ID }}" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}")

          echo "$RESPONSE"
