# FeelAtHomeNow CI — backend import check + frontend build (no deployment)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (PostgreSQL + Alembic + pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: feelathomenow_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci_user -d feelathomenow_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Alembic + role bootstrap use ci_user (superuser). Pytest uses feelathomenow_app (RLS enforced).
      SECRET_KEY: ci-placeholder-secret-key-min-32-chars-for-pytest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Alembic upgrade head
        env:
          DATABASE_URL: postgresql+psycopg2://ci_user:ci_password@localhost:5432/feelathomenow_ci
        run: alembic upgrade head

      - name: Create app role and grants (non-superuser, no BYPASSRLS)
        env:
          MIGRATE_DATABASE_URL: postgresql+psycopg2://ci_user:ci_password@localhost:5432/feelathomenow_ci
          CI_MIGRATION_ROLE: ci_user
          CI_APP_ROLE_PASSWORD: feelathomenow_app_ci_pass
        run: python scripts/ci_grant_app_role.py

      - name: Backend tests (full suite)
        env:
          ENVIRONMENT: production
          DATABASE_URL: postgresql+psycopg2://feelathomenow_app:feelathomenow_app_ci_pass@localhost:5432/feelathomenow_ci
          TEST_DATABASE_URL: postgresql+psycopg2://feelathomenow_app:feelathomenow_app_ci_pass@localhost:5432/feelathomenow_ci
        run: pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Frontend tests
        run: |
          cd frontend
          npm test -- --watchAll=false --testPathPattern="landlord"

      - name: Frontend build
        run: |
          cd frontend
          npm run build
